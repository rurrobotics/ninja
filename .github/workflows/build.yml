name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: controller-linux
            artifact_path: controller/target/release/controller
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            artifact_name: controller-windows
            artifact_path: controller/target/release/controller.exe
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            artifact_name: controller-rpi5
            artifact_path: controller/target/aarch64-unknown-linux-gnu/release/controller
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./controller

    steps:
    - uses: actions/checkout@v4

    - name: Install cross-compilation tools (RPi5)
      if: matrix.target == 'aarch64-unknown-linux-gnu' && matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Add Rust target
      run: rustup target add ${{ matrix.target }}

    - name: Build
      run: cargo build --release --verbose --target ${{ matrix.target }}
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_path }}
